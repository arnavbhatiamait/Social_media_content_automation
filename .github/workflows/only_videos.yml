name: Videos only Workflow

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "30 6 * * *"  # 12:00 PM IST (06:30 AM UTC)
  #   - cron: "30 12 * * *" # 06:00 PM IST (12:30 PM UTC)

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Verify FFmpeg
        run: |
          ffmpeg -version
          ffprobe -version
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Secrets Files
        run: |
          echo '${{ secrets.GCP_SECRETS_JSON }}' > gcp_secrets.json
          echo '${{ secrets.YT_TOKEN_JSON }}' > token.json
          echo '${{ secrets.YT_CLIENT_SECRET_JSON }}' > client_secret.json

      - name: Run Full Pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          USE_CLOUD_SAVE: "True"
          GCP_CREDENTIALS_PATH: "gcp_secrets.json"
          USE_DATABASE: "TRUE"
          GCP_BUCKET_NAME: ${{ secrets.GCP_BUCKET_NAME }}
          INSTAGRAM_APP_SECRET: ${{ secrets.INSTAGRAM_APP_SECRET }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          GCP_LOCATION: ${{ secrets.GCP_LOCATION }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADD_SUBTITLES: "FALSE"
          SLEEP_TIME_DOCKER: 18000
          IS_DOCKER: "False"
          VEO: ${{ secrets.VEO }}
          VEO_MODEL_NAME: ${{ secrets.VEO_MODEL_NAME }}
        run: python main.py --video

      # - name: Commit and push changes to video_prompts.txt
      #   run: |
      #     git config --global user.name "github-actions[bot]"
      #     git config --global user.email "github-actions[bot]@users.noreply.github.com"
      #     git add video_prompts.txt
