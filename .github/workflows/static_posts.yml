name: Static Posts Workflow

on:
  workflow_dispatch:
  schedule:
    # - cron: "0 9 * * *"  # 02:30 PM IST (09:00 AM UTC)
    # - cron: "0 18 * * *" # 11:30 PM IST (06:00 PM UTC)

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_static.txt

      - name: Write GCP Secrets file
        run: |
          echo '${{ secrets.GCP_SECRETS_JSON }}' > gcp_secrets.json

      - name: Create .env file from Secrets
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          echo "USE_CLOUD_SAVE=True" >> .env
          echo "GCP_CREDENTIALS_PATH=gcp_secrets.json" >> .env
          echo "USE_DATABASE=TRUE" >> .env
          echo "GCP_BUCKET_NAME=${{ secrets.GCP_BUCKET_NAME }}" >> .env
          echo "INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}" >> .env
          echo "META_APP_ID=${{ secrets.META_APP_ID }}" >> .env
          echo "INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}" >> .env
          echo "INSTAGRAM_ACCOUNT_ID=${{ secrets.INSTAGRAM_ACCOUNT_ID }}" >> .env
          echo "INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}" >> .env
          echo "FB_PAGE_ID=${{ secrets.FB_PAGE_ID }}" >> .env
          echo "FB_ACCESS_TOKEN=${{ secrets.FB_ACCESS_TOKEN }}" >> .env
          echo "LINKEDIN_CLIENT_ID=${{ secrets.LINKEDIN_CLIENT_ID }}" >> .env
          echo "LINKEDIN_CLIENT_SECRET=${{ secrets.LINKEDIN_CLIENT_SECRET }}" >> .env
          echo "LINKEDIN_ORGANIZATIONAL_ID=${{ secrets.LINKEDIN_ORGANIZATIONAL_ID }}" >> .env
          echo "LINKEDIN_ACCESS_TOKEN=${{ secrets.LINKEDIN_ACCESS_TOKEN }}" >> .env
          echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}" >> .env
          echo "SERPER_API_KEY=${{ secrets.SERPER_API_KEY }}" >> .env
          echo "EXA_API_KEY=${{ secrets.EXA_API_KEY }}" >> .env

      - name: Run Static Post Pipeline
        run: python main_static.py
